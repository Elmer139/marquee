<meta charset="utf-8">
<title>Marquee</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/apple-touch-icon.png" sizes="180x180">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#14151B">
<style>
  :root {
    --bg: #F6F3EC;
    --bg-2: #EFEBE1;
    --surface: #FFFFFF;
    --surface-2: #F1EDE3;
    --line: #DED7C7;
    --ink: #1A1815;
    --ink-2: #5C574E;
    --ink-3: #8A8375;
    --screen: #C8811A;
    --screen-soft: rgba(200,129,26,0.12);
    --sound: #128C90;
    --sound-soft: rgba(18,140,144,0.12);
    --accent: var(--screen);
    --accent-soft: var(--screen-soft);
    --danger: #B23A3A;
    --shadow: 0 1px 2px rgba(26,24,21,0.06), 0 8px 24px rgba(26,24,21,0.08);
    --radius: 14px;
    --maxw: 1120px;
    --serif: Georgia, 'Times New Roman', serif;
    --sans: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0E0F13; --bg-2: #14151B; --surface: #191A21; --surface-2: #1F212A;
      --line: #2C2E39; --ink: #F2EFE8; --ink-2: #ABA79D; --ink-3: #6E6B63;
      --screen: #E8B04B; --screen-soft: rgba(232,176,75,0.14);
      --sound: #4FC3C6; --sound-soft: rgba(79,195,198,0.14); --danger: #E5726F;
      --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 12px 32px rgba(0,0,0,0.45);
    }
  }
  :root[data-theme="light"] {
    --bg: #F6F3EC; --bg-2: #EFEBE1; --surface: #FFFFFF; --surface-2: #F1EDE3;
    --line: #DED7C7; --ink: #1A1815; --ink-2: #5C574E; --ink-3: #8A8375;
    --screen: #C8811A; --screen-soft: rgba(200,129,26,0.12);
    --sound: #128C90; --sound-soft: rgba(18,140,144,0.12); --danger: #B23A3A;
    --shadow: 0 1px 2px rgba(26,24,21,0.06), 0 8px 24px rgba(26,24,21,0.08);
  }
  :root[data-theme="dark"] {
    --bg: #0E0F13; --bg-2: #14151B; --surface: #191A21; --surface-2: #1F212A;
    --line: #2C2E39; --ink: #F2EFE8; --ink-2: #ABA79D; --ink-3: #6E6B63;
    --screen: #E8B04B; --screen-soft: rgba(232,176,75,0.14);
    --sound: #4FC3C6; --sound-soft: rgba(79,195,198,0.14); --danger: #E5726F;
    --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 12px 32px rgba(0,0,0,0.45);
  }

  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); line-height: 1.5; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 20px; }

  header.marquee { border-bottom: 1px solid var(--line); background: linear-gradient(180deg, var(--bg-2), var(--bg)); position: sticky; top: 0; z-index: 20; backdrop-filter: blur(8px); }
  .marquee-inner { display: flex; align-items: center; gap: 16px; padding: 14px 20px; max-width: var(--maxw); margin: 0 auto; flex-wrap: wrap; }
  .brand { display: flex; align-items: baseline; gap: 10px; margin-right: auto; }
  .bulbs { display: flex; gap: 4px; align-self: center; }
  .bulb { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); opacity: 0.85; }
  .brand h1 { font-family: var(--serif); font-weight: 700; font-style: italic; font-size: 26px; margin: 0; letter-spacing: 0.5px; }
  .brand .sub { color: var(--ink-3); font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; }

  .theme-btn { border: 1px solid var(--line); background: var(--surface); color: var(--ink-2); width: 38px; height: 38px; border-radius: 10px; cursor: pointer; font-size: 16px; display: grid; place-items: center; }
  .theme-btn:hover { color: var(--ink); border-color: var(--accent); }

  .domains { display: flex; gap: 8px; }
  .domain-tab { border: 1px solid var(--line); background: transparent; color: var(--ink-2); padding: 9px 16px; border-radius: 999px; cursor: pointer; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: all 0.15s; }
  .domain-tab .dot { width: 8px; height: 8px; border-radius: 50%; }
  .domain-tab[data-d="screen"] .dot { background: var(--screen); }
  .domain-tab[data-d="sound"] .dot { background: var(--sound); }
  .domain-tab.active { color: var(--ink); border-color: currentColor; background: var(--accent-soft); }

  .toolbar { display: flex; gap: 12px; align-items: center; padding: 20px 0 8px; flex-wrap: wrap; }
  .search { flex: 1 1 260px; min-width: 180px; display: flex; align-items: center; gap: 8px; border: 1px solid var(--line); background: var(--surface); border-radius: 10px; padding: 0 12px; }
  .search input { border: none; background: transparent; color: var(--ink); font-size: 15px; padding: 11px 0; width: 100%; outline: none; font-family: var(--sans); }
  .search svg { flex: none; color: var(--ink-3); }
  .seg { display: flex; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
  .seg button { border: none; background: var(--surface); color: var(--ink-2); padding: 10px 14px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .seg button.active { background: var(--accent-soft); color: var(--ink); }
  .seg button + button { border-left: 1px solid var(--line); }

  .collbar { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 0 2px; }
  .collbar button { border: 1px solid var(--line); background: transparent; color: var(--ink-2); border-radius: 999px; padding: 6px 13px; font-size: 12px; font-weight: 600; cursor: pointer; letter-spacing: 0.3px; }
  .collbar button:hover { color: var(--accent); border-color: var(--accent); }
  .collbar button.active { background: var(--accent-soft); color: var(--ink); border-color: var(--accent); }
  .collbar button.gen { color: var(--ink-3); font-weight: 500; }
  .collbar button.gen.active { color: var(--ink); font-weight: 600; }
  .cb-div { width: 1px; align-self: center; height: 20px; background: var(--line); margin: 0 4px; }

  .count { color: var(--ink-3); font-size: 13px; padding: 10px 0 14px; letter-spacing: 0.3px; }
  .count b { color: var(--accent); font-variant-numeric: tabular-nums; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; padding-bottom: 120px; align-items: stretch; }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; cursor: pointer; transition: border-color 0.15s, transform 0.15s; display: flex; flex-direction: column; }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .card-top { display: flex; gap: 14px; padding: 16px; flex: 1; }
  .poster { width: 54px; min-width: 54px; height: 80px; border-radius: 8px; border: 1px solid var(--line); background-color: var(--surface-2); background-size: cover; background-position: center; background-repeat: no-repeat; display: grid; place-items: center; overflow: hidden; }
  .poster .ph { font-family: var(--serif); font-style: italic; font-weight: 700; font-size: 21px; color: rgba(255,255,255,0.92); letter-spacing: 0.5px; text-shadow: 0 1px 3px rgba(0,0,0,0.28); }
  .poster.has-img { border-color: transparent; }
  .poster.has-img .ph { display: none; }
  .poster.has-img { cursor: zoom-in; }
  .lightbox { position: fixed; inset: 0; z-index: 60; background: rgba(8,8,10,0.9); display: none; align-items: center; justify-content: center; padding: 12px; cursor: zoom-out; }
  .lightbox.open { display: flex; }
  .lightbox img { width: 96vw; height: 94vh; object-fit: contain; border-radius: 8px; }
  .card-body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .card h3 { font-family: var(--serif); font-style: italic; font-weight: 700; font-size: 19px; margin: 0 0 2px; line-height: 1.2; min-height: 2.4em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card .meta { color: var(--ink-2); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .chip.more { color: var(--ink-3); border-style: dashed; }
  .chip { font-size: 11px; letter-spacing: 0.4px; text-transform: uppercase; color: var(--ink-2); border: 1px solid var(--line); border-radius: 999px; padding: 3px 9px; }
  .chip.year { font-family: var(--mono); font-variant-numeric: tabular-nums; letter-spacing: 0; color: var(--accent); border-color: var(--accent); }
  .chip.type { background: var(--accent-soft); border-color: transparent; color: var(--ink); }
  .chip.coll { border-style: dashed; border-color: var(--accent); color: var(--accent); cursor: pointer; }
  .chip.coll:hover { background: var(--accent-soft); }
  .card-bottom { margin-top: auto; padding-top: 10px; }
  .moment-hint { font-size: 12px; font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 5px; }
  .logline-row { padding: 11px 16px 14px; border-top: 1px solid var(--line); font-family: var(--sans); font-size: 13.5px; font-weight: 500; color: var(--ink-2); line-height: 1.35; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Detail overlay */
  .detail-modal { position: relative; }
  .detail-modal .x { position: absolute; top: 12px; right: 14px; z-index: 3; background: var(--surface); border: 1px solid var(--line); border-radius: 8px; width: 32px; height: 32px; }
  .detail-head { display: flex; gap: 16px; padding: 22px 20px 16px; border-bottom: 1px solid var(--line); }
  .poster.lg { width: 96px; min-width: 96px; height: 144px; border-radius: 10px; }
  .poster.lg .ph { font-size: 40px; }
  .detail-head-body { flex: 1; min-width: 0; }
  .detail-title { font-family: var(--serif); font-style: italic; font-weight: 700; font-size: 24px; line-height: 1.15; margin: 2px 34px 6px 0; text-wrap: balance; }
  .detail-head-body .meta { color: var(--ink-2); font-size: 14px; margin-bottom: 10px; }
  .detail { padding: 18px 20px 22px; }
  .detail .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--ink-3); margin: 0 0 8px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .detail .label + .label { margin-top: 18px; }
  .hint2 { text-transform: none; letter-spacing: 0; color: var(--ink-3); font-weight: 400; }
  .detail p { margin: 0 0 6px; font-size: 14px; color: var(--ink); }
  .funfact { margin: 4px 0 20px; padding: 16px 18px; border-left: 3px solid var(--accent); background: var(--accent-soft); border-radius: 0 12px 12px 0; }
  .funfact .eyebrow { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1.4px; color: var(--accent); font-weight: 700; margin-bottom: 8px; }
  .funfact p { font-family: var(--serif); font-size: 16.5px; line-height: 1.55; margin: 0; color: var(--ink); text-wrap: pretty; }
  .providers { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin: -2px 0 14px; }
  .providers:empty { display: none; }
  .prov-label { font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.8px; }
  .prov-label.dim { text-transform: none; letter-spacing: 0; font-style: italic; }
  .prov img { height: 28px; width: 28px; border-radius: 6px; display: block; }
  .prov.txt { font-size: 12px; border: 1px solid var(--line); border-radius: 6px; padding: 3px 8px; }
  .prov-more { font-size: 12px; color: var(--ink-2); text-decoration: none; font-weight: 600; }
  .prov-more:hover { color: var(--accent); }
  .prov-loading { font-size: 12px; color: var(--ink-3); font-style: italic; }
  .watch { display: flex; flex-wrap: wrap; gap: 8px; }
  .watch a { text-decoration: none; font-size: 13px; font-weight: 600; color: var(--ink); border: 1px solid var(--line); border-radius: 9px; padding: 8px 12px; display: inline-flex; align-items: center; gap: 6px; background: var(--surface); }
  .watch a:hover { border-color: var(--accent); color: var(--accent); }
  .watch a.hot { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .foot { text-align: center; color: var(--ink-3); font-size: 12px; padding: 8px 0 48px; letter-spacing: 0.3px; }
  .foot a { color: var(--ink-2); text-decoration: none; }
  .foot a:hover { color: var(--accent); }
  .watch.moments a { background: var(--accent-soft); border-color: transparent; }
  .watch.moments a .tri { color: var(--accent); font-size: 11px; }
  .watch.moments a:hover { border-color: var(--accent); }
  .actions { display: flex; align-items: center; gap: 14px; margin-top: 18px; flex-wrap: wrap; }
  .share { display: inline-flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--line); color: var(--ink-2); border-radius: 9px; padding: 8px 13px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--sans); }
  .share:hover { border-color: var(--accent); color: var(--accent); }
  .share.copied { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }
  .edit { background: none; border: none; color: var(--ink-2); font-size: 12px; font-weight: 600; cursor: pointer; padding: 0; }
  .edit:hover { color: var(--accent); }
  .del { background: none; border: none; color: var(--danger); font-size: 12px; cursor: pointer; padding: 0; }
  .del:hover { text-decoration: underline; }
  .confirm { font-size: 13px; color: var(--ink-2); display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .del-yes { background: var(--danger); color: #fff; border: none; border-radius: 8px; padding: 6px 12px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .del-yes:hover { filter: brightness(1.08); }
  .del-no { background: none; border: 1px solid var(--line); color: var(--ink-2); border-radius: 8px; padding: 6px 12px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .del-no:hover { border-color: var(--accent); color: var(--accent); }

  .table-scroll { overflow-x: auto; padding-bottom: 120px; }
  table { width: 100%; border-collapse: collapse; min-width: 640px; }
  th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--ink-3); padding: 10px 14px; border-bottom: 2px solid var(--line); cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { color: var(--accent); }
  th .arw { opacity: 0; margin-left: 4px; }
  th.sorted .arw { opacity: 1; color: var(--accent); }
  td { padding: 12px 14px; border-bottom: 1px solid var(--line); font-size: 14px; vertical-align: top; }
  tr.row { cursor: pointer; }
  tr.row:hover td { background: var(--surface-2); }
  td.t-title { font-family: var(--serif); font-style: italic; font-weight: 700; font-size: 16px; }
  td.t-year { font-family: var(--mono); font-variant-numeric: tabular-nums; color: var(--accent); }
  td .sub2 { color: var(--ink-3); font-size: 12px; font-family: var(--sans); font-style: normal; font-weight: 400; margin-top: 2px; }
  td .sub2 .tri { color: var(--accent); font-weight: 700; }
  .coll-tag { display: inline-block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--accent); border: 1px dashed var(--accent); border-radius: 6px; padding: 1px 6px; margin: 0 6px 4px 0; cursor: pointer; }
  .coll-tag:hover { background: var(--accent-soft); }
  tr.detail-row td { background: var(--surface-2); }
  tr.detail-row .detail { display: block; border: none; padding: 4px 4px 16px; background: none; }

  .fab { position: fixed; right: 24px; bottom: 24px; z-index: 30; width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer; background: var(--accent); color: #10100c; font-size: 30px; line-height: 1; box-shadow: 0 8px 24px rgba(0,0,0,0.28); display: grid; place-items: center; }
  :root[data-theme="light"] .fab { color: #fff; }
  .fab:hover { transform: scale(1.05); }

  .overlay { position: fixed; inset: 0; background: rgba(10,10,12,0.55); z-index: 40; display: none; align-items: flex-end; justify-content: center; }
  .overlay.open { display: flex; }
  @media (min-width: 640px) { .overlay { align-items: center; } }
  .modal { background: var(--surface); width: 100%; max-width: 520px; border-radius: 18px 18px 0 0; border: 1px solid var(--line); box-shadow: var(--shadow); max-height: 92vh; overflow-y: auto; }
  @media (min-width: 640px) { .modal { border-radius: 18px; } }
  .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--surface); z-index: 1; }
  .modal-head h2 { font-family: var(--serif); font-style: italic; margin: 0; font-size: 22px; }
  .x { background: none; border: none; color: var(--ink-3); font-size: 24px; cursor: pointer; line-height: 1; }
  form { padding: 20px; display: grid; gap: 14px; }
  .field { display: grid; gap: 6px; }
  .field label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--ink-3); }
  .field input, .field textarea, .field select { border: 1px solid var(--line); background: var(--bg); color: var(--ink); border-radius: 10px; padding: 11px 12px; font-size: 15px; font-family: var(--sans); outline: none; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 68px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .title-row { display: flex; gap: 8px; }
  .title-row input { flex: 1; }
  .lookup-btn { flex: none; border: 1px solid var(--accent); background: var(--accent-soft); color: var(--accent); border-radius: 10px; padding: 0 14px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .story-btn { margin-top: 8px; align-self: flex-start; border: 1px solid var(--accent); background: var(--accent-soft); color: var(--accent); border-radius: 10px; padding: 9px 14px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: var(--sans); }
  .story-btn:disabled { opacity: 0.7; cursor: default; }
  .lookup-btn:disabled { opacity: 0.6; cursor: default; }
  .lookup-results { display: none; margin-top: 8px; border: 1px solid var(--line); border-radius: 10px; overflow-x: hidden; overflow-y: auto; max-height: 264px; }
  .lookup-results.show { display: block; }
  .lookup-results button { display: flex; gap: 10px; align-items: flex-start; width: 100%; text-align: left; background: var(--surface); border: none; border-bottom: 1px solid var(--line); padding: 10px 12px; cursor: pointer; font-family: var(--sans); color: var(--ink); }
  .lookup-results button:last-child { border-bottom: none; }
  .lookup-results button:hover { background: var(--surface-2); }
  .lookup-results .lr-thumb { width: 42px; min-width: 42px; height: 63px; border-radius: 5px; background: var(--surface-2) center/cover no-repeat; display: grid; place-items: center; }
  .lookup-results .lr-thumb.ph { font-size: 18px; }
  .lookup-results .lr-body { flex: 1; min-width: 0; }
  .lookup-results .lr-title { display: block; font-weight: 700; font-size: 14px; }
  .lookup-results .lr-desc { display: block; font-size: 12.5px; color: var(--ink-2); margin-top: 2px; line-height: 1.4; }
  .lookup-results .lr-status { padding: 10px 12px; font-size: 13px; color: var(--ink-3); }
  .hl-row { display: grid; grid-template-columns: 1fr 1.3fr; gap: 8px; }
  .domain-pick { display: flex; gap: 8px; }
  .domain-pick label { flex: 1; position: relative; }
  .domain-pick input { position: absolute; opacity: 0; }
  .domain-pick span { display: block; text-align: center; padding: 11px; border: 1px solid var(--line); border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; color: var(--ink-2); }
  .domain-pick input:checked + span { border-color: var(--accent); background: var(--accent-soft); color: var(--ink); }
  .submit { background: var(--accent); color: #12110c; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; }
  :root[data-theme="light"] .submit { color: #fff; }
  .hint { color: var(--ink-3); font-size: 12px; text-transform: none; letter-spacing: 0; font-weight: 400; }

  .empty { text-align: center; color: var(--ink-3); padding: 70px 20px; }
  .empty .big { font-family: var(--serif); font-style: italic; font-size: 22px; color: var(--ink-2); margin-bottom: 6px; }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>

<header class="marquee">
  <div class="marquee-inner">
    <div class="brand">
      <span class="bulbs"><span class="bulb"></span><span class="bulb"></span><span class="bulb"></span></span>
      <h1>Marquee</h1>
      <span class="sub" id="brandsub">Now Showing</span>
    </div>
    <div class="domains">
      <button class="domain-tab active" data-d="screen"><span class="dot"></span>Screen</button>
      <button class="domain-tab" data-d="sound"><span class="dot"></span>Sound</button>
    </div>
    <button class="theme-btn" id="themeBtn" title="Toggle light / dark">◐</button>
  </div>
</header>

<main class="wrap">
  <div class="toolbar">
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="search" placeholder="Search titles, artists, genres…" autocomplete="off">
    </div>
    <div class="seg" id="viewSeg">
      <button data-v="grid" class="active">Cards</button>
      <button data-v="table">Table</button>
    </div>
  </div>
  <div class="collbar" id="collbar"></div>
  <div class="count" id="count"></div>
  <div id="content"></div>

  // ---------- State + storage ----------
  var KEY = "marquee.items.v1", THEMEKEY = "marquee.theme", DELKEY = "marquee.deletedSeeds.v1";
  var userItems = load();
  var deletedSeeds = loadDel();
  var state = { domain: "screen", view: "grid", q: "", coll: "", sortKey: "title", sortDir: 1, detailId: null, confirmDel: null };

  function load() { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch (e) { return []; } }
  function save() { try { localStorage.setItem(KEY, JSON.stringify(userItems)); } catch (e) {} }
  function loadDel() { try { return JSON.parse(localStorage.getItem(DELKEY)) || []; } catch (e) { return []; } }
  function saveDel() { try { localStorage.setItem(DELKEY, JSON.stringify(deletedSeeds)); } catch (e) {} }
  function allItems() {
    var seeded = SEED.map(function (it, i) { return Object.assign({ id: "s" + i, seed: true }, it); })
      .filter(function (it) { return deletedSeeds.indexOf(it.id) === -1; });
    return seeded.concat(userItems);
  }
  function deleteItem(id) {
    if (id.charAt(0) === "s") { if (deletedSeeds.indexOf(id) === -1) { deletedSeeds.push(id); saveDel(); } }
    else { userItems = userItems.filter(function (x) { return x.id !== id; }); save(); }
    state.confirmDel = null;
  }
  function byId(id) { return allItems().filter(function (x) { return x.id === id; })[0]; }

  var $ = function (s) { return document.querySelector(s); };
  function esc(str) {
    return String(str == null ? "" : str).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  function watchLinks(it) {
    var q = encodeURIComponent(it.title + (it.year ? " " + it.year : ""));
    if (it.d === "screen") {
      // A specific title beats a search: use the exact trailer/clip link if the item has one.
      var trailer = it.trailer
        ? { label: "▶ Trailer", url: it.trailer, hot: true, exact: true }
        : { label: "▶ Find trailer", url: "https://www.youtube.com/results?search_query=" + encodeURIComponent(it.title + " " + (it.year || "") + (it.type === "TV Series" ? " series" : "") + " official trailer"), hot: true };
      return [
        trailer,
        { label: "All options (JustWatch)", url: "https://www.justwatch.com/us/search?q=" + encodeURIComponent(it.title) },
        { label: "On TV tonight", url: "https://www.google.com/search?q=" + q + "+on+tv+schedule" }
      ];
    }
    var m = encodeURIComponent(it.title + " " + (it.sub || ""));
    var listen = it.trailer
      ? { label: "▶ Play", url: it.trailer, hot: true, exact: true }
      : { label: "▶ Find on YouTube", url: "https://www.youtube.com/results?search_query=" + m, hot: true };
    return [
      listen,
      { label: "Spotify", url: "https://open.spotify.com/search/" + m },
      { label: "On the radio", url: "https://www.google.com/search?q=" + m + "+radio+play" }
    ];
  }

  function domainMoods() {
    var present = {};
    allItems().forEach(function (it) { if (it.d === state.domain) moodsOf(it).forEach(function (mo) { present[mo] = 1; }); });
    var ordered = MOOD_ORDER.filter(function (c) { return present[c]; });
    Object.keys(present).forEach(function (c) { if (ordered.indexOf(c) === -1) ordered.push(c); });
    return ordered;
  }
  function domainGenres() {
    var counts = {};
    allItems().forEach(function (it) {
      if (it.d === state.domain) (it.genre || []).forEach(function (g) { counts[g] = (counts[g] || 0) + 1; });
    });
    return Object.keys(counts).sort(function (a, b) { return counts[b] - counts[a] || a.localeCompare(b); });
  }
  function allMoods() {
    var set = MOOD_ORDER.slice();
    allItems().forEach(function (it) { moodsOf(it).forEach(function (mo) { if (set.indexOf(mo) === -1) set.push(mo); }); });
    return set;
  }

  function currentList() {
    var q = state.q.trim().toLowerCase();
    var list = allItems().filter(function (it) { return it.d === state.domain; });
    if (state.coll) list = list.filter(function (it) { return moodsOf(it).indexOf(state.coll) !== -1 || (it.genre || []).indexOf(state.coll) !== -1; });
    if (q) {
      list = list.filter(function (it) {
        var hay = it.title + " " + (it.sub || "") + " " + (it.genre || []).join(" ") + " " +
          it.type + " " + it.year + " " + moodsOf(it).join(" ") + " " +
          (it.highlights || []).map(function (h) { return h.label; }).join(" ");
        return hay.toLowerCase().indexOf(q) !== -1;
      });
    }
    var k = state.sortKey, dir = state.sortDir;
    list.sort(function (a, b) {
      var av, bv;
      if (k === "year") { av = a.year || 0; bv = b.year || 0; }
      else if (k === "genre") { av = (a.genre || [""])[0].toLowerCase(); bv = (b.genre || [""])[0].toLowerCase(); }
      else if (k === "type") { av = a.type.toLowerCase(); bv = b.type.toLowerCase(); }
      else { av = a.title.toLowerCase().replace(/^the\s+/, ""); bv = b.title.toLowerCase().replace(/^the\s+/, ""); }
      if (av < bv) return -1 * dir;
      if (av > bv) return 1 * dir;
      return 0;
    });
    return list;
  }

  // Re-rank merged results: real titles (films/series) up, the year up, person bio pages down.

    return hits.map(function (h, i) {
      var text = ((h.title || "") + " " + (h.snippet || "")).replace(/<[^>]+>/g, "").toLowerCase();
      var score = -i * 0.05; // gentle nudge for Wikipedia's own order; content signals should dominate
      if (yr && (h.title.indexOf(yr) > -1 || text.indexOf(yr) > -1)) score += 4;
      subWords.forEach(function (w) { if (text.indexOf(w) > -1) score += 1.4; });
      if (domain === "screen" && /\(\d{4} film\)|\bfilm\b|television series|tv series|miniseries|sitcom/.test(text)) score += 2.2;
      if (domain === "sound" && /\bsong\b|\balbum\b|single|band|musician|singer/.test(text)) score += 1.8;
      if (/\(\d{4} film\)|\(film\)|\(\d{4} tv series\)/.test((h.title || "").toLowerCase())) score += 1.6; // an actual film/series page title is a strong match
      if (/\(disambiguation\)|^list of/.test((h.title || "").toLowerCase())) score -= 2.5; // skip index/list pages
      if (/\bis a[n]? .{0,34}(company|studio|distributor|label|network|franchise|imprint)\b/.test(text)) score -= 3; // demote companies/orgs

      if (/\bis (an?|the)\b[^.]{0,40}\b(actor|actress|singer|musician|director|producer|rapper|songwriter|comedian|screenwriter|filmmaker)\b/.test(text)) score -= 3.5;

    lookupBox.classList.add("show");
    lookupBox.innerHTML = '<div class="lr-status">Searching…</div>';
    var base = "https://en.wikipedia.org/w/api.php?action=query&list=search&srlimit=12&srinfo=suggestion&srprop=snippet&format=json&origin=*&srsearch=";
    var suffix = domain === "screen" ? " film" : "";
    var plain = qv + suffix;
    var rich = qv + (sub ? " " + sub : "") + (yr ? " " + yr : "") + suffix;
    function searchWiki(q) { return fetch(base + encodeURIComponent(q)).then(function (r) { return r.json(); }); }
    function merge(seen, into, j) { ((j.query && j.query.search) || []).forEach(function (h) { if (!seen[h.title]) { seen[h.title] = 1; into.push(h); } }); }
    var reqs = [searchWiki(plain)];
    if (rich !== plain) reqs.push(searchWiki(rich));
    if (qv !== plain) reqs.push(searchWiki(qv)); // raw title = the most reliable "did you mean" source
    Promise.all(reqs).then(function (js) {
      var seen = {}, merged = [], suggestion = null;
      js.forEach(function (j) {
        if (j.query && j.query.searchinfo && j.query.searchinfo.suggestion) suggestion = j.query.searchinfo.suggestion;
        merge(seen, merged, j);
      });
      // Typo tolerance: whenever Wikipedia has a "did you mean", fold those results in too.
      if (suggestion && suggestion.toLowerCase() !== qv.toLowerCase()) {
        return searchWiki(suggestion + (/film|song/.test(suggestion) ? "" : suffix)).then(function (j2) {
          merge(seen, merged, j2);
          renderLookupHits(rankHits(merged, sub, yr, domain).slice(0, 12));
        });
      }
      renderLookupHits(rankHits(merged, sub, yr, domain).slice(0, 12));
    }).catch(function () { lookupBox.innerHTML = '<div class="lr-status">Lookup needs internet — works on the live site.</div>'; });
  }
  function parseGenre(ex) {
    var m = ex.match(/\b(?:19|20)\d{2}\s+([A-Za-z][A-Za-z\s-]*?)\s+(?:film|television series|TV series|miniseries|sitcom|drama series)\b/);
    if (!m) return "";
    var strip = { american: 1, british: 1, japanese: 1, french: 1, italian: 1, german: 1, canadian: 1, australian: 1, spanish: 1, mexican: 1, indian: 1, chinese: 1, korean: 1, soviet: 1, russian: 1, irish: 1, swedish: 1, danish: 1, independent: 1, silent: 1, animated: 1 };
    var words = m[1].trim().split(/\s+/);
    while (words.length > 1 && strip[words[0].toLowerCase()]) words.shift();
    return words.join(" ").replace(/\b\w/g, function (c) { return c.toUpperCase(); });
  }
  // A light, editable mood suggestion from the genre/description, so a new card isn't blank & is filterable.
  function suggestMoods(text) {
    var g = (text || "").toLowerCase(), out = [];
    function add(m) { if (out.indexOf(m) === -1) out.push(m); }
    if (/romance|romantic|love story/.test(g)) add("True Love");
    if (/\bcomedy\b|comedies|romantic comedy|comedy-drama|sitcom|parody|\bfarce\b|screwball|slapstick|mockumentary/.test(g)) add("Funny");
    if (/\bwar\b|holocaust/.test(g)) { add("Heartbreaking"); add("Thought-Provoking"); }
    if (/document|biograph|based on a true|historical|\bhistory\b/.test(g)) { add("Inspirational"); add("Thought-Provoking"); }
    if (/action|adventure|superhero|\bspy\b|heist|thriller|crime|disaster|martial|western|survival/.test(g)) add("Thrilling");
    if (/science fiction|sci-fi|mystery|psychological|dystop|philosoph|surreal|neo-noir|\bnoir\b/.test(g)) add("Thought-Provoking");
    if (/horror|slasher/.test(g)) add("Controversial");
    if (/musical|\bsports\b|underdog/.test(g)) add("Inspirational");
    if (/\banimated\b|animation|children's/.test(g)) add("Funny");
    if (/\bdrama\b|tragedy/.test(g)) add("Heartbreaking");
    if (/soul music|gospel|\bworship\b/.test(g)) add("Spiritual");
    return out;
  }
  function pickLookup(pageKey) {
    var domain = (form.querySelector('input[name="domain"]:checked') || {}).value || "screen";
    lookupBox.innerHTML = '<div class="lr-status">Fetching details…</div>';
    fetch("https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(pageKey))
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (j) {
        if (!j) { lookupBox.innerHTML = '<div class="lr-status">Could not load that one.</div>'; return; }
        var ex = j.extract || "";
        setField("title", (j.title || "").replace(/\s*\((?:[^()]*\b(?:film|song|album|TV series)\b[^()]*)\)\s*$/i, ""));
        var ym = ex.match(/\b(?:19|20)\d{2}\b/); if (ym) setField("year", ym[0]);
        if (domain === "screen") {
          var dm = ex.match(/directed by ([A-Z][^,.;]+?)(?:,| and | based | from |\.|;|$)/);
          if (dm) setField("sub", dm[1].trim());
          var g = parseGenre(ex);
          if (g && !form.querySelector('[name="genre"]').value) setField("genre", g);
        }
        var ms = suggestMoods((parseGenre(ex) || "") + " " + ex);
        if (!ms.length) ms = [domain === "screen" ? "Thrilling" : "Inspirational"];
        if (!form.querySelector('[name="moods"]').value) setField("moods", ms.join(", "));
        if (j.thumbnail && j.thumbnail.source) state.lookupImg = j.thumbnail.source;
        state.lookupWiki = pageKey; // remember which page the details came from, so the poster matches
        lookupBox.classList.remove("show"); lookupBox.innerHTML = "";
      })
      .catch(function () { lookupBox.innerHTML = '<div class="lr-status">Could not load that one.</div>'; });
  }
  $("#storyBtn").addEventListener("click", function () {
    var btn = this;
    var title = (form.querySelector('[name="title"]').value || "").trim();
    if (!title) { form.querySelector('[name="title"]').focus(); return; }
    var domain = (form.querySelector('input[name="domain"]:checked') || {}).value || "screen";
    var type = ($("#typeSelect") || {}).value || "";
    var kind = domain === "sound" ? (type === "Artist" || type === "Band" ? "artist" : "song") : (type === "TV Series" ? "tv" : "movie");
    var sub = (form.querySelector('[name="sub"]').value || "").trim();
    var year = (form.querySelector('[name="year"]').value || "").trim();
    btn.disabled = true; btn.textContent = "✨ Finding the story…";
    fetch("/api/story?title=" + encodeURIComponent(title) + "&kind=" + kind + "&sub=" + encodeURIComponent(sub) + "&year=" + encodeURIComponent(year))
      .then(function (r) { return r.json(); })
      .then(function (j) {
        btn.disabled = false; btn.textContent = "✨ Get the story";
        if (!j || j.configured === false) { btn.textContent = "✨ Needs a Gemini key (free) — ask Claude"; setTimeout(function () { btn.textContent = "✨ Get the story"; }, 3000); return; }
        if (j.error) { btn.textContent = "Hmm, try again"; setTimeout(function () { btn.textContent = "✨ Get the story"; }, 2500); return; }
        if (j.story) {
          if (j.story.logline) setField("logline", j.story.logline);
          if (j.story.trivia) setField("note", j.story.trivia);
        }
      }).catch(function () { btn.disabled = false; btn.textContent = "✨ Get the story"; });
  });
  $("#lookupBtn").addEventListener("click", runLookup);
  lookupBox.addEventListener("click", function (e) {
    var tb = e.target.closest("button[data-tmdbid]");
    if (tb) { pickTmdb(tb.dataset.tmdbid, tb.dataset.kind); return; }
    var b = e.target.closest("button[data-key]"); if (b) pickLookup(b.dataset.key);
  });
  // Enter in ANY field (except the multi-line notes) runs Look up — and never submits/closes the form.
  form.addEventListener("keydown", function (e) {
    if (e.key !== "Enter" || e.target.tagName !== "INPUT") return;
    e.preventDefault();
    runLookup();
  });

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    var f = new FormData(form);
    var domain = f.get("domain");
    var title = (f.get("title") || "").trim();
    if (!title) return;
    var highlights = [];
    [["hl_label_1", "hl_url_1"], ["hl_label_2", "hl_url_2"]].forEach(function (p) {
      var u = (f.get(p[1]) || "").trim();
      if (u) highlights.push({ label: (f.get(p[0]) || "Watch this moment").trim(), url: u });
    });
    var orig = state.editOrig;
    if (orig && orig.highlights && orig.highlights.length > 2) highlights = highlights.concat(orig.highlights.slice(2));
    var fields = {
      d: domain,
      type: f.get("type") || (domain === "screen" ? "Movie" : "Song"),
      title: title,
      sub: (f.get("sub") || "").trim(),
      year: parseInt(f.get("year"), 10) || null,
      genre: (f.get("genre") || "").split(",").map(function (s) { return s.trim(); }).filter(Boolean),
      moods: (f.get("moods") || "").split(",").map(function (s) { return s.trim(); }).filter(Boolean),
      note: (f.get("note") || "").trim(),
      logline: (f.get("logline") || "").trim(),
      highlights: highlights
    };
    var trailer = (f.get("trailer") || "").trim();
    if (trailer) fields.trailer = trailer;
    var posterUrl = (f.get("posterUrl") || "").trim();
    var img = posterUrl || state.lookupImg || (orig && orig.img) || null; // a pasted poster wins
    if (img) fields.img = img;
    var wiki = state.lookupWiki || (orig && orig.wiki) || null; // the page details came from -> poster matches
    if (wiki) fields.wiki = wiki;

    var resultId = null, wasEdit = !!state.editId;
    if (state.editId && state.editId.charAt(0) === "s") {
      fields.id = "u" + Date.now(); userItems.push(fields);
      if (deletedSeeds.indexOf(state.editId) === -1) { deletedSeeds.push(state.editId); saveDel(); }
      resultId = fields.id;
    } else if (state.editId) {
      for (var i = 0; i < userItems.length; i++) {
        if (userItems[i].id === state.editId) { fields.id = state.editId; userItems[i] = fields; break; }
      }
      resultId = state.editId;
    } else {
      fields.id = "u" + Date.now(); userItems.push(fields);
    }
    save();
    state.domain = domain; state.coll = "";
    document.querySelectorAll(".domain-tab").forEach(function (t) { t.classList.toggle("active", t.dataset.d === domain); });
    applyAccent(); closeModal(); render();
    if (wasEdit && resultId) openDetail(resultId); // reopen the detail so the change is visible
    backfillMoods(); backfillStories();
  });

  // ---------- Auto-populate the "feel" on every card (once; respects later removals) ----------
  function enrichMoods(it, cb) {
    if ((it.moods && it.moods.length) || it._enriched) { cb(false); return; }
    it._enriched = true;
    var dflt = it.d === "screen" ? "Thrilling" : "Inspirational"; // never leave a card blank
    var fromHave = suggestMoods(((it.genre || []).join(" ")) + " " + (it.note || ""));
    if (fromHave.length) { it.moods = fromHave; cb(true); return; }
    var base = "https://en.wikipedia.org/w/api.php?action=query&list=search&srlimit=8&format=json&origin=*&srsearch=";
    var q = it.title + (it.year ? " " + it.year : "") + " " + typeWord(it);
    fetch(base + encodeURIComponent(q)).then(function (r) { return r.json(); }).then(function (j) {
      var hits = rankHits((j.query && j.query.search) || [], it.sub, String(it.year || ""), it.d);
      var pick = bestTypedHit(hits, it) || hits[0];
      if (!pick) { it.moods = [dflt]; cb(true); return; }
      it.wiki = pick.title; // pin the page so the poster is pulled from the SAME work as the blurb
      return fetch("https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(pick.title))
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (s) {
          var ex = s ? (s.extract || "") : "";
          if (it.d === "screen" && (!it.genre || !it.genre.length)) { var g = parseGenre(ex); if (g) it.genre = [g]; }
          // year: take it from the page title (e.g. "(2023 TV series)"), NOT the blurb (which may cite a novel's year)
          var ty = (pick.title || "").match(/\((\d{4})/); if (!it.year && ty) it.year = parseInt(ty[1], 10);
          // cast: enables a lead-actor photo when there's no poster
          if (!it.sub && ex) { var cm = ex.match(/\b(?:stars|starring|features) ([A-Z][^.]+?)(?:\.|,? and | as | in | under |$)/); if (cm) it.sub = cm[1].split(/,| and /).map(function (n) { return n.trim(); }).filter(Boolean).slice(0, 2).join(", "); }
          if (!it.img && s && s.thumbnail && s.thumbnail.source) it.img = s.thumbnail.source;
          var ms = suggestMoods(((it.genre || []).join(" ")) + " " + ex);
          it.moods = ms.length ? ms : [dflt];
          cb(true);
        });
    }).catch(function () { it.moods = [dflt]; cb(true); });
  }
  function backfillMoods() {
    var pending = userItems.filter(function (it) { return !(it.moods && it.moods.length) && !it._enriched; });
    if (!pending.length) return;
    var remaining = pending.length, touched = false;
    pending.forEach(function (it) {
      enrichMoods(it, function (changed) {
        if (changed) touched = true;
        if (--remaining === 0) { save(); if (touched) render(); backfillStories(); }
      });
    });
  }
  // Auto-write the AI story (vibe + trivia) for user-added cards that don't have one yet.
  var storiesBusy = false;
  function backfillStories() {
    if (storiesBusy) return;
    // re-queue any card marked "done" that never actually received a vibe
    userItems.forEach(function (it) { if (it._storied && !it.logline) delete it._storied; });
    var pending = userItems.filter(function (it) { return !it._storied && (!it.note || !it.logline); });
    if (!pending.length) return;
    storiesBusy = true;
    var i = 0;
    (function next() {
      if (i >= pending.length) { storiesBusy = false; return; }
      var it = pending[i];
      var kind = it.d === "sound" ? (it.type === "Artist" || it.type === "Band" ? "artist" : "song") : (it.type === "TV Series" ? "tv" : "movie");
      fetch("/api/story?title=" + encodeURIComponent(it.title) + "&kind=" + kind + (it.year ? "&year=" + it.year : "") + (it.sub ? "&sub=" + encodeURIComponent(it.sub) : ""))
        .then(function (r) { return r.json(); })
        .then(function (j) {
          if (!j || j.configured === false || j.error) { storiesBusy = false; return; } // no key / rate-limited -> stop, retry next session
          if (j.story) {
            var got = false;
            if (j.story.logline && !it.logline) { it.logline = j.story.logline; got = true; }
            if (j.story.trivia && !it.note) { it.note = j.story.trivia; got = true; }
            if (j.story.logline) it._storied = true; // only "done" once it truly has a vibe
            if (got) { save(); render(); }
          }
          i++; setTimeout(next, 2200); // stay under the free-tier rate limit
        })
        .catch(function () { storiesBusy = false; });
    })();
  }

  // ---------- Theme ----------
  (function initTheme() {
    var saved = null;
    try { saved = localStorage.getItem(THEMEKEY); } catch (e) {}
    if (saved) document.documentElement.setAttribute("data-theme", saved);
    $("#themeBtn").addEventListener("click", function () {
      var cur = document.documentElement.getAttribute("data-theme");
      var isDark = cur ? cur === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
      var next = isDark ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      try { localStorage.setItem(THEMEKEY, next); } catch (e) {}
    });
  })();

  $("#foot").innerHTML = "Marquee · v" + APP_VERSION + " · your taste, organized";

  applyAccent();
  render();
  backfillMoods();
  backfillStories();
})();
</script>
